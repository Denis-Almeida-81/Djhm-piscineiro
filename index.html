<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJHM Piscineiro</title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <div class="header-content">
                <img class="logo-piscina" src="./assets/logo-piscina.avif" alt="logo-piscina">
                <h1>Djhm Piscineiro <span>Limpeza & Tratamento de piscinas</span></h1>
            </div>
        </div>
    </header>

    <nav>
        <div class="container">
            <div class="nav-content">
                <a class="nav-link" href="#">Início</a>
                <a class="nav-link" href="#">Serviços</a>
                <a class="nav-link" href="#">Sobre</a>
                <a class="nav-link" href="#">Contato</a>

        </div>

    <main>

            <div class="container">

                        <h3>Recuperação</h3>
                        <img class="logo-services" src="./assets/recup-piscina.jpg" alt="Recuperação de piscina">

        <section>
            <div class="container">
                <div class="section-content">
                    <a class="link-icone" href="https://wa.me/5511995919238" target="_blank">
                        <i class="fab fa-whatsapp"></i>WhatsApp</a>
                    <a class="link-icone" href="https://www.instagram.com/djhmpiscineiro?igsh=MWk1cWhpYnUzcTV1bw=="
                        target="_blank">
                        <i class="fab fa-instagram"></i>Instagram</a>
                </div>
            </div>
        </section>

    <footer>
        <div class="container">
            <p>© 2026 Djhm Piscineiro - Todos os direitos reservados</p>
        </div>
    </footer>
